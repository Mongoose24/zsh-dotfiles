[[mgr.prepend_keymap]]
on = "n"
run = "shell 'nano \"$@\"' --block --confirm"
desc = "Open in nano"

[[mgr.prepend_keymap]]
on = "o"
run = "shell 'if [[ \"$OSTYPE\" == \"darwin\"* ]]; then open \"$@\"; else xdg-open \"$@\"; fi'"
desc = "Open with default app"

[[mgr.prepend_keymap]]
on = "p"
run = "shell 'if [[ \"$OSTYPE\" == \"darwin\"* ]]; then open -R \"$@\"; else dolphin --select \"$@\"; fi'"
desc = "Reveal in file manager"

[[mgr.prepend_keymap]]
on = "Z"
run = '''shell 'fzf --preview "cat {}" --preview-window right:50%:wrap --bind "n:execute(nano {})"' --block'''
desc = "fzf file finder"

[[mgr.prepend_keymap]]
on   = [ "t", "t" ]
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on   = "p"
run  = "plugin smart-paste"
desc = "Paste into the hovered directory or CWD"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"
