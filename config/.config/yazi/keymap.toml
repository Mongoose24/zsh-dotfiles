[[mgr.prepend_keymap]]
on = "n"
run = "shell 'nano \"$@\"' --block --confirm"
desc = "Open in nano"

[[mgr.prepend_keymap]]
on = "o"
run = "shell 'if [[ \"$OSTYPE\" == \"darwin\"* ]]; then open -R \"$@\"; else xdg-open \"$@\"; fi' --block --confirm"
desc = "Open with default app"

[[mgr.prepend_keymap]]
on = "p"
run = "shell 'if [[ \"$OSTYPE\" == \"darwin\"* ]]; then open \"$@\"; else xdg-open \"$@\"; fi' --confirm"
desc = "Open with default app"

[[mgr.prepend_keymap]]
on = "l"
run = ["shell", "open -a \"$(osascript -e 'choose application')\" \"$@\"", "--confirm"]
desc = "Open with..."
