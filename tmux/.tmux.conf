set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

unbind C-b
set-option -g prefix M-x
bind-key M-x send-prefix
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position bottom       # macOS / darwin style
set -g default-terminal "${TERM}"
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g popup-style 'bg=default'
set -g popup-border-style 'bg=default'

# Core bindings carried over from the previous config
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key R command-prompt -I "#S" "rename-session '%%'"
bind-key c new-window -c "#{pane_current_path}"

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'blue'
set -g @floax-text-color 'magenta'
set -g @floax-bind 'g'
set -g @floax-change-path 'true'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
# set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
# set -g @catppuccin_date_time_text "%H:%M"

run '~/.tmux/plugins/tpm/tpm'

# Clear stale plugin/default bindings after reload, then set your pane splits.
unbind-key k
unbind-key o
unbind-key p
bind-key k run-shell 'if command -v sesh >/dev/null 2>&1; then out="$(sesh list --icons | fzf-tmux -p 80%,70% --no-sort --ansi --border-label " sesh " --prompt "⚡  " --header "  ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find  |  enter: window  shift-enter: session" --color "bg:-1,bg+:-1,gutter:-1,border:-1,preview-bg:-1,fg:#cdd6f4,fg+:#cdd6f4,hl:#f38ba8,hl+:#f38ba8,info:#89b4fa,marker:#f9e2af,pointer:#f5c2e7,prompt:#89b4fa,header:#a6adc8" --bind "tab:down,btab:up" --bind "ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)" --bind "ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)" --bind "ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)" --bind "ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)" --bind "ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)" --bind "ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)" --expect=shift-enter --preview-window "right:55%" --preview "sesh preview {}" || true)"; [ -z "$out" ] && exit 0; key=$(echo "$out" | head -1); selected=$(echo "$out" | tail -1); [ -z "$selected" ] && exit 0; if [ "$key" = "shift-enter" ]; then sesh connect "$selected"; else path=$(echo "$selected" | sed "s/^[^ ]* //"); if [ -d "$path" ]; then tmux new-window -c "$path" -n "$(basename "$path")"; else sesh connect "$selected"; fi; fi; else tmux display-message "sesh not installed"; fi'
bind-key o split-window -h -c "#{pane_current_path}"
bind-key p split-window -v -c "#{pane_current_path}"

# Copy mode: override plugin defaults after TPM loads.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode c send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi c send-keys -X copy-selection-and-cancel
